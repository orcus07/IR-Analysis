<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IR Analysis — 실적·컨콜 비교 분석</title>
<style>
  :root {
    --bg: #fafaf8; --fg: #1f2328; --muted: #6a737d; --line: #e2e2dd;
    --card: #ffffff; --accent: #0b57d0; --quote: #f2f4f8; --th: #f4f4f1;
    --warn: #9a6700;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a; --fg: #e6e8eb; --muted: #98a1ab; --line: #2c313a;
      --card: #1b1f26; --accent: #7fb0ff; --quote: #20242c; --th: #21262e;
      --warn: #d4a72c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.7 -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  header {
    position: sticky; top: 0; z-index: 10; background: var(--bg);
    border-bottom: 1px solid var(--line); padding: 10px 16px;
  }
  header h1 { margin: 0 0 8px; font-size: 17px; }
  header h1 small { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  .controls select {
    flex: 1 1 160px; min-width: 0; padding: 7px 8px; font-size: 14px;
    color: var(--fg); background: var(--card); border: 1px solid var(--line);
    border-radius: 8px;
  }
  .runner { max-width: 780px; margin: 10px auto 0; font-size: 13.5px; }
  .runner summary {
    cursor: pointer; color: var(--accent); font-weight: 600;
    list-style-position: inside; -webkit-user-select: none; user-select: none;
  }
  .runner-body {
    margin-top: 8px; padding: 12px; background: var(--card);
    border: 1px solid var(--line); border-radius: 10px;
    display: grid; gap: 8px;
  }
  .runner-body label { display: grid; gap: 3px; color: var(--muted); font-size: 12.5px; }
  .runner-body label.row { grid-template-columns: auto 1fr; align-items: center; color: var(--fg); font-size: 13.5px; }
  .runner-body input[type="text"], .runner-body input[type="password"],
  .runner-body select, .runner-body textarea {
    padding: 7px 8px; font-size: 14px; color: var(--fg); background: var(--bg);
    border: 1px solid var(--line); border-radius: 8px; width: 100%;
    font-family: inherit; line-height: 1.5;
  }
  .runner-body button {
    padding: 9px; font-size: 14px; font-weight: 600; color: #fff;
    background: var(--accent); border: 0; border-radius: 8px; cursor: pointer;
  }
  .runner-body button:disabled { opacity: .5; cursor: default; }
  #run-status { font-size: 13px; min-height: 1em; }
  #run-status a { color: var(--accent); }
  .runner-note { color: var(--muted); font-size: 11.5px; line-height: 1.5; }
  main { max-width: 780px; margin: 0 auto; padding: 16px 16px 64px; }
  .meta { color: var(--muted); font-size: 12.5px; margin-bottom: 14px; }
  article h1 { font-size: 21px; line-height: 1.35; margin: 8px 0 12px; }
  article h2 {
    font-size: 17px; margin: 28px 0 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }
  article h3 { font-size: 15.5px; margin: 20px 0 8px; }
  article p { margin: 10px 0; }
  article a { color: var(--accent); text-decoration: none; }
  article a:hover { text-decoration: underline; }
  article hr { border: 0; border-top: 1px solid var(--line); margin: 24px 0; }
  article blockquote {
    margin: 12px 0; padding: 8px 14px; background: var(--quote);
    border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0;
    color: var(--fg); font-size: 14.5px;
  }
  article ul, article ol { margin: 8px 0; padding-left: 22px; }
  article li { margin: 4px 0; }
  article code {
    background: var(--quote); padding: 1px 5px; border-radius: 4px;
    font-size: 13px;
  }
  .tablewrap { overflow-x: auto; margin: 12px 0; border: 1px solid var(--line); border-radius: 8px; }
  table { border-collapse: collapse; width: 100%; font-size: 13.5px; }
  th, td { padding: 7px 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
  td + td, th + th { border-left: 1px solid var(--line); }
  th { background: var(--th); font-weight: 600; white-space: nowrap; }
  tr:last-child td { border-bottom: 0; }
  /* 넓은 비교표에서 첫 열(지표명)을 고정해 모바일 가로 스크롤을 돕는다 */
  th:first-child, td:first-child {
    position: sticky; left: 0; z-index: 1;
    background: var(--th); border-right: 1px solid var(--line);
  }
  td:first-child { background: var(--bg); font-weight: 600; }
  .footer-note { color: var(--muted); font-size: 12px; margin-top: 40px; }
</style>
</head>
<body>
<header>
  <h1>📊 IR Analysis<small id="count"></small></h1>
  <div class="controls">
    <select id="sel-target" aria-label="분석 대상"></select>
    <select id="sel-report" aria-label="보고서"></select>
  </div>
  <details class="runner" id="runner">
    <summary>▶ 새 분석 실행</summary>
    <div class="runner-body">
      <label>분석 대상 회사
        <input type="text" id="run-target" placeholder="예: NVIDIA" list="target-list">
      </label>
      <datalist id="target-list"></datalist>
      <label>관점(페르소나)
        <select id="run-persona"></select>
      </label>
      <label id="custom-persona-wrap" style="display:none">관점 직접 서술
        <textarea id="run-custom-persona" rows="3"
          placeholder="예: 삼성전자 메모리 전략기획 담당자. 경쟁사 실적에서 우리 캐파 투자·HBM 로드맵 결정에 필요한 시사점을 뽑는다."></textarea>
      </label>
      <label id="url-persona-wrap" style="display:none">페르소나 raw URL (YAML 또는 프롬프트 텍스트)
        <input type="text" id="run-persona-url"
          placeholder="예: https://raw.githubusercontent.com/…/persona.yaml">
      </label>
      <label>모델
        <select id="run-model">
          <option value="claude-fable-5">Fable 5 — 품질 최상 (기본)</option>
          <option value="claude-opus-4-8">Opus 4.8 — 균형 (비용 절반)</option>
          <option value="claude-sonnet-5">Sonnet 5 — 비용형</option>
        </select>
      </label>
      <label>분석 범위
        <select id="run-scope">
          <option value="both">통합 (실적 + 컨콜)</option>
          <option value="earnings">IR 실적 딥다이브</option>
          <option value="call">어닝콜 딥다이브</option>
        </select>
      </label>
      <label class="row"><input type="checkbox" id="run-competitive" checked> 경쟁사 비교</label>
      <label>경쟁사 (쉼표 구분, 비우면 기본값)
        <input type="text" id="run-competitors" placeholder="예: SK hynix, Samsung Electronics">
      </label>
      <label>실행 브랜치
        <input type="text" id="run-branch">
      </label>
      <label>GitHub 토큰 (fine-grained, 이 저장소 Actions: Read and write)
        <input type="password" id="run-token" placeholder="github_pat_… — 이 브라우저에만 저장">
      </label>
      <button id="run-btn">Actions로 분석 실행</button>
      <div id="run-status"></div>
      <div class="runner-note">
        토큰은 localStorage에만 저장하고 어디에도 전송하지 않는다(GitHub API 호출 제외).
        공용 기기에서는 쓰지 말 것. 실행에는 저장소 Secrets의 ANTHROPIC_API_KEY가 필요하다.
        완료 후 Pages 반영까지 1~2분 걸린다.
      </div>
    </div>
  </details>
</header>
<main>
  <div class="meta" id="meta"></div>
  <article id="report"></article>
  <p class="footer-note">공개 정보 기반 참고용 분석 · 투자 권유 아님 ·
    새 보고서는 <code>python -m ir_analysis.analyze</code> →
    <code>python -m render.build</code> 로 누적된다.</p>
</main>
<script>
const REPORTS = [{"id": "2026-07-22_super-micro-computer_sk_hynix_marketer", "title": "Super Micro Computer 실적·컨콜 분석 — SK하이닉스 마케터 관점", "date": "2026-07-22", "target": "Super Micro Computer", "persona": "sk_hynix_marketer", "scope": "both", "quarter": "", "md": "# Super Micro Computer 최신 실적·컨콜 분석 — SK하이닉스 마케터 관점\n\n> **케이스 설정**\n> - **페르소나**: SK하이닉스 메모리(HBM/DRAM/NAND) 마케팅 담당자\n> - **분석 대상**: Super Micro Computer(SMCI) — FY2026 3분기(2026년 3월 31일 종료, 5월 5일 발표) + 오늘(7월 22일) 공개된 FY2026 4분기 예비 실적\n> - **경쟁 분석**: ON — Dell Technologies(FY2027 1분기), HPE(FY2026 2분기)\n> - **작성일**: 2026-07-22\n\n### 데이터 신뢰도 경고\n\n- **1차 사료 확보**: SMCI 실적 보도자료(IR)와 회사가 게시한 컨콜 준비 발언 PDF, SMCI FY26 4분기 예비 실적 공지(IR), Dell 보도자료(자사 뉴스룸·SEC 8-K 첨부), HPE 보도자료(IR PDF)를 확보했다.\n- **컨콜 전문은 2차 전사에 의존**: SMCI·Dell·HPE 컨콜 발췌는 Investing.com, Motley Fool, Yahoo Finance 등 2차 전사를 썼다. **원문 1:1 대조는 미완료**다. 실제로 2차 전사에는 오탈이 있다. 예컨대 Investing.com 전사는 SMCI 가이던스를 \"first quarter\"로 적었으나, 회사 공식 준비 발언 PDF는 \"For the fourth quarter, we target $12 billion given stable supply conditions.\"라고 명기했다. 본 보고서는 공식 PDF를 우선했다.\n- **컨센서스 집계 기관**: SMCI는 Investing.com 집계(매출 $12.39B, 비GAAP EPS $0.62)와 CNBC 집계(매출 약 $12.33B)·Bloomberg 집계(비GAAP 매출총이익률 6.75%)를 병기했다. Dell은 LSEG와 Zacks, HPE는 CNBC 인용 컨센서스를 썼다.\n- **⚠️ 확인 필요 항목**:\n  - SMCI 발표 직후 주가 반응이 매체마다 다르다(시간외 +1.18% vs 시간외 약 +18% vs 발표 후 +24.5%). 시점 차이로 보이나 확인이 필요하다.\n  - Dell AI서버 매출의 YoY 증가율이 상충한다(Futurum +757% vs Blocks & Files +291.7%). 본문에서는 금액($16.1B)만 쓴다.\n  - HPE FY27 프레임의 \"operating margins of 12% to 16%\" 표현은 1차 사료 대조가 안 됐다. '영업이익 성장률'의 오기 가능성이 있어 확인이 필요하다.\n  - Dell FQ1'27 분기 종료일(5월 1일 추정)은 1차 사료에서 날짜를 직접 확인하지 못했다.\n  - SMCI 4분기 예비치는 확정 실적이 아니다. 확정 실적과 컨콜은 8월 11일에 나온다.\n\n### 기간 정합성 — 회계연도 vs 캘린더 매핑\n\n| 회사 | FY 명칭 | 실제 기간 | 분기 종료일 | CY 매핑 |\n|---|---|---|---|---|\n| SMCI | FY2026 Q3 | 2026년 1~3월 | 2026-03-31 | CY26 1분기 |\n| SMCI(예비) | FY2026 Q4 | 2026년 4~6월 | 2026-06-30 | CY26 2분기 |\n| Dell | FY2027 Q1 | 2026년 2~5월 초 | 2026-05-01 추정 ⚠️ | CY26 2~4월 |\n| HPE | FY2026 Q2 | 2026년 2~4월 | 2026-04-30 | CY26 2~4월 |\n\n> **시점차 주의**: SMCI 3분기는 3월 말에 끝나 Dell·HPE보다 약 한 달 이르다. 다만 SMCI는 오늘 6월 분기(CY26 2분기) 예비치를 냈으므로, 이를 함께 보면 세 회사의 시점이 대체로 맞춰진다.\n\n## 1. Super Micro Computer — 정량 요약\n\n**FY2026 3분기 (2026-03-31 종료, 5월 5일 발표)**\n\n| 지표 | FQ3'26 실적 | 전분기(FQ2'26) | 전년동기(FQ3'25) | 컨센서스 | 판정 |\n|---|---|---|---|---|---|\n| 매출 | $10.2B | $12.7B | $4.6B (+123% YoY) | $12.39B(Investing.com) | **하회(약 -18%)** |\n| GAAP 매출총이익률 | 9.9% | 6.3% | 9.6% | — | — |\n| 비GAAP 매출총이익률 | 10.1%* | 6.4% | 9.7% | 6.75%(Bloomberg) | **상회*** |\n| GAAP 순이익 | $483M | $401M | $109M | — | — |\n| GAAP 희석 EPS | $0.72 | $0.60 | $0.17 | — | — |\n| 비GAAP 희석 EPS | $0.84 | — | $0.31 | $0.62 | **상회(+35%)** |\n| 영업현금흐름 | -$6.6B(유출), 설비투자 $97M | 약 -$24M | — | — | **대규모 유출 ⚠️** |\n\n\\* **주의(깨끗한 서프라이즈 아님)**: 이번 마진 반등에는 전분기 대비 소멸한 비용 요인이 섞였다. Motley Fool 전사에 따르면 마진 개선은 \"improved customer and product mix, and reduced tariffs, expedite, and inventory reserve charges\" 때문이다. 즉 고객·제품 믹스 개선에 더해 관세·긴급운송·재고평가 충당 비용이 줄어든 효과가 컸다. 구조적 마진 개선과 일회성 완화 효과를 나눠 봐야 한다.\n\n**가이던스와 4분기 예비 실적**\n\n| 항목 | 회사 가이던스(5/5 제시) | 시장 기대 | 예비 실적(7/22 공개) |\n|---|---|---|---|\n| FQ4'26 매출 | $11.0~12.5B | $11.07B(CNBC 인용) | 가이던스 하단 부근 |\n| FQ4'26 비GAAP EPS | $0.65~0.79 | $0.55(CNBC 인용) | 8/11 발표 예정 |\n| FQ4'26 매출총이익률 | 8.2~8.4% | — | **15~17%로 대폭 상회**(우호적 고객·제품 믹스) |\n| FY26 연간 매출 | $38.9~40.4B | — | — |\n| 수주 | — | — | 4분기에만 신규 수주 $60B 초과, 백로그 사상 최대 |\n\n## 2. Super Micro Computer — 컨콜 정성(톤) 발췌 분석\n\n*아래 발췌는 2차 전사(투자매체) 기반이며 원문 1:1 대조는 미완료다. 회사 공식 PDF에서 확인한 발언은 별도 표기했다.*\n\n**① 성장 자신감 — 목표 숫자를 직접 제시**\n- 원문(공식 PDF): \"For the fourth quarter, we target $12 billion given stable supply conditions.\" 연간으로는 400억 달러를 목표한다고 밝혔다.\n- 원문(2차 전사): \"I remain very bullish about our growth in the AI and data center market.\"\n- 해석: 매출이 컨센서스를 18% 밑돌았는데도 CEO는 목표 숫자를 물리지 않았다. 다만 \"공급이 안정된다면\"이라는 단서를 달았다.\n- 시사점: 서버 조립 최상위권 업체가 분기 120억 달러 매출을 공언한다. 이 물량이 소화할 서버 DRAM·eSSD 수요는 그만큼 커진다. 동시에 '공급 단서'는 부품 공급자가 협상 지렛대를 쥐고 있다는 증거다.\n\n**② 매출 미스의 원인 — 수요가 아니라 '현장 준비'와 부품**\n- 원문: \"Several customers were not yet equipped with the power and networking required for their cloud deployment\"\n- 해석: 고객 데이터센터의 전력·네트워킹이 늦어 매출 인식이 밀렸다고 설명했다. 수요 소멸이 아니라 이연이라는 프레임이다.\n- 시사점: AI 인프라 병목이 GPU에서 전력·냉각·현장 준비로 옮겨 간다. 메모리 수요의 분기별 출렁임은 커질 수 있으나, 총량은 유지된다. 분기 단위 주문 변동에 과민할 필요가 없다.\n\n**③ 공급관 — 메모리를 병목으로 지목**\n- 근거(2차 매체 요약): CFO는 업계 전반의 공급 제약이 실적을 깎았다고 말했고, CEO는 메모리 가격이 급등했고 GPU·인텔 CPU도 부족하다고 말했다. (CNBC 기사 요약이며 축어 인용 아님)\n- 원문(CFO): \"we expect some challenge going forward, but not like we incurred over the last six months\"\n- 해석: 지난 6개월이 가장 힘들었고, 앞으로도 제약은 남지만 완화를 기대한다는 톤이다.\n- 시사점: 고객이 어닝콜에서 '메모리 가격 급등'을 실적 변수로 공식 언급했다. 가격 인상이 시장에 정착했다는 뜻이다. 다만 CFO의 '완화 기대'는 하반기 협상에서 인상 폭 저항 논리로 쓰일 수 있다.\n\n**④ 마진·사업 모델 — 두 자릿수 마진 공약과 DCBBS**\n- 원문: \"We are committed to achieving a sustainable double-digit gross margin model\"\n- 근거: 엔터프라이즈 시장과 DCBBS(Data Center Building Block Solutions)에 집중해 마진을 높이겠다고 했고, 네오클라우드·소버린 AI·에이전틱 AI 부문 수요가 매우 강하다고 밝혔다. 소프트웨어 매출은 몇 분기 전 분기당 1,000만 달러 미만에서 지난 분기 3,400만 달러, 이번 분기 4,600만 달러 이상 수주로 늘었다.\n- 해석: 하드웨어 조립 마진에서 소프트웨어·서비스 동반 판매로 이익 구조를 바꾸는 중이다. 실제로 4분기 예비 마진 15~17%가 나오면서 이 공약은 조기에 숫자로 증명됐다.\n- 시사점: 고객의 지불 여력이 커졌다. 시스템 업체가 마진을 두 배 가까이 늘리는 국면이라면, 메모리 가격 인상분을 최종 가격에 전가할 공간도 그만큼 넓다.\n\n**⑤ 로드맵 — 차세대 플랫폼 선점 경쟁**\n- 원문: \"We are preparing to be among the first to market with the new Vera Rubin systems\"\n- 근거: GB300 NVL72, B300 HGX, B200 NVL4 등 최신 랙스케일 시스템을 다수 출하 중이라고 밝혔다.\n- 해석: NVIDIA 차세대 플랫폼의 '최초 출시(first to market)' 지위를 마케팅 핵심으로 삼는다.\n- 시사점: Vera Rubin 세대는 HBM4 채용 세대다. 시스템 업체의 '최초 출시' 경쟁은 곧 HBM4 조기·대량 확보 경쟁이다. 플랫폼 전환 일정에 맞춘 선행 영업이 필요하다.\n\n**⑥ 회사 정체성 — '토털 데이터센터 인프라' 서사**\n- 원문(보도자료): \"Supermicro's transformation into a total datacenter infrastructure provider is accelerating\"\n- 해석: 서버 조립사가 아니라 데이터센터 인프라 전체를 파는 회사라는 서사를 민다. 한편 이번 분기 영업현금흐름은 66억 달러 유출로, 성장 자금 부담(부품 선구매·재고)이 크다는 이면도 드러났다.\n- 시사점: 현금이 빠듯한 고객은 결제 조건·선급 구조에 민감하다. 공급 계약 설계 시 물량 커밋과 대금 조건을 함께 다뤄야 한다.\n\n## 3. 경쟁 현황 — 정량 비교\n\n> **시점차 고지**: SMCI는 3월 말 ooked $24.4 billion in AI orders and recognized $16.1 billion of AI server revenue.\" | \"Traditional server orders increased triple digits\"이라며 AI와 전통 서버 동반 수요를 말함, 보안 중시 산업의 온프렘 AI 가속을 말함 | SMCI는 신흥 세그먼트, Dell은 고객 수 확장, HPE는 온프렘·전통 서버 부활 |\n| 공급관(메모리·부품) | 메모리 가격 급등과 GPU·인텔 CPU 부족을 말함 | 수요가 공급을 계속 앞서며 메모리 등 부품이 최대 제약이라고 말함 | \"on the memory cost increases, we will continue to see that throughout 2026\"이라 말함(FQ1'26 콜, 3월) | 세 회사 모두 메모리 병목을 공인 — 표현 강도는 Dell이 가장 높음 |\n| 가격 구조·전가 | 가격 정책 직접 언급은 확인 못 함(⚠️). 다만 FQ4 마진 15~17% 예비치로 전가+믹스 개선을 방증함 | \"we are repricing it feels like every day. And I am sure our customers feel that pain.\"이라며 상시 재가격을 말함 | 기록적 매출총이익률 36.9%로 원가 상승 속 마진 방어를 보여줌 | Dell은 '일 단위 재가격'을 공개 선언 — 인상 전가가 가장 공격적 |\n| 점유율·경쟁 태도 | \"We are preparing to be among the first to market with the new Vera Rubin systems\"라며 신플랫폼 선점을 말함 | \"folks are trying to secure that supply now and over multiple years because it is going to be more constrained\"이라며 다년 물량 선점 수요를 말함 | \"the combination of networking, compute, storage, and memory positions HPE competitively\"라며 포트폴리오 결합 우위를 말함 | SMCI는 속도, Dell은 공급 확보력, HPE는 포트폴리오 폭으로 경쟁함 |\n| 투자·재무 기조 | 영업현금 -$6.6B로 성장에 현금을 쏟아붓는 기조를 보임 | 기록적 현금창출($4.1B)과 주주환원 $2.1B를 병행함 | FY26 말 2x 순레버리지 조기 달성 후 FCF의 75% 이상 환원을 말함 | SMCI는 현금 소진형 성장, Dell·HPE는 성장+환원 병행 |\n| 리스크 단서 | \"given stable supply conditions\"라는 조건부 단서를 닮 | \"we are living in an inflationary environment that is changing at a rate that obviously we have never seen before\"라며 인플레 지속을 말함 | 수요 선반영(pull-in) 증거는 없다고 말함 | 셋 다 수요보다 공급·원가를 위험으로 지목함 |\n\n## 5. SK하이닉스 마케터를 위한 임플리케이션\n\n**(1) 방어 — 경쟁 위협 신호**\n- 고객(서버 OEM) 3사가 모두 메모리를 최대 병목으로 공식화했다. Dell은 고객이 \"지금, 그리고 다년에 걸쳐\" 공급을 확보하려 한다고 말했다. 다년 계약 수요는 기회이지만, 고정가 요구로 이어지면 상승 사이클의 수익을 스스로 잠그는 결과가 된다. 다년 '물량' 커밋과 '가격' 커밋을 분리해 대응해야 한다.\n- SMCI CFO는 공급 제약이 지난 6개월만큼 나쁘지는 않으리라고 말했다. 고객이 하반기 협상에서 '공급 완화' 논리로 인상 폭을 깎으려 들 수 있다. 국내 매체가 짚었듯 2026~2027년 신규 캐파는 HBM에 우선 배정되고 범용 D램 증산은 공정 전환에 의존해 부족이 이어질 전망이므로, 공급 데이터로 반박 논리를 준비해야 한다.\n\n**(2) 공세 — 마케팅 기회**\n- 백로그가 수요 가시성을 보증한다. SMCI는 한 분기에 신규 수주 600억 달러를 넘겼고, Dell은 AI 백로그 513억 달러, HPE는 회사 전체 백로그 신기록을 말했다. 서버향 DRAM·eSSD 수요는 최소 4~6분기 이상 견조하다는 뜻이다. '공급 확실성'을 프리미엄 가치로 팔 국면이다. SMCI의 \"given stable supply conditions\"라는 단서가 그 증거다. 고객의 매출 가이던스 달성이 우리 공급에 달렸다는 프레임으로 협상 지위를 굳혀야 한다.\n- 플랫폼 전환이 HBM4 선행 영업 시점을 알려준다. SMCI는 Vera Rubin 시스템의 최초 출시를 준비한다고 말했다. HBM4는 3분기부터 출하가 본격화하고 내년도 HBM 공급가 협상이 진행 중이므로, 시스템 업체의 '최초 출시' 경쟁을 HBM4 조기 인증·물량 배정 마케팅으로 연결해야 한다.\n- HPE의 전통 서버 주문 세 자릿수 증가는 AI 외 일반 서버 D램 수요의 복원을 보여준다. AI향에 가려진 범용 서버 세그먼트도 가격·물량 협상에서 강하게 다룰 수 있다.\n\n**(3) 가격·계약 구조 점검**\n- Dell은 사실상 매일 재가격한다고 말했다. 고객은 판가를 일 단위로 올리는데 우리가 분기·연간 고정가에 묶이면 인상분이 고객 마진으로 흘러간다. 실제로 SMCI는 FQ4 마진을 가이던스(8.2~8.4%)의 두 배인 15~17%로 예고했다. 시스템 업체의 마진 급팽창은 '전가 여력이 충분하다'는 증거이므로, 인상 협상에서 근거 자료로 쓸 수 있다. 계약은 시장가 연동(인덱스) 또는 짧은 재협상 주기로 설계해야 한다.\n- SMCI의 영업현금 66억 달러 유출은 부품 선구매 부담을 보여준다. 물량 보장을 원하는 고객에게는 선급금·장기 커밋을 조건으로 붙이는 구조가 유효하다.\n\n**(4) 수요처 변화 — 마케팅 외연**\n- SMCI가 말한 네오클라우드·소버린 AI·에이전틱 AI, Dell의 AI 고객 5,000곳 초과, HPE가 말한 보안 중시 산업의 온프렘 AI 가속은 하이퍼스케일러 밖의 신규 수요층이다. 대형 CSP 중심의 키어카운트 영업을 네오클라우드·소버린·엔터프라이즈 온프렘으로 넓힐 근거가 확보됐다.\n- HPE는 네트워킹·컴퓨트·스토리지에 '메모리'를 나란히 놓고 경쟁력을 말했다. 시스템 업체 스스로 메모리를 가치의 축으로 인정한 발언이므로, 공동 마케팅(레퍼런스 아키텍처, 검증 프로그램) 제안의 문이 열려 있다.\n\n**(5) 톤 벤치마크**\n- Dell은 주문($24.4B)→매출($16.1B)→백로그($51.3B)의 삼각 수치로 신뢰를 만든다. SMCI는 미스 상황에서도 분기 120억 달러라는 목표 숫자로 서사를 방어한다. HPE는 장기 목표(FY28)를 앞당겨 달성했다는 프레임으로 상향을 정당화한다. SK하이닉스도 '수주 잔고·공급 가시성'을 수치화한 메시지로 투자자·고객 신뢰 프레임에서 밀리지 않아야 한다. 특히 셋 모두 '수요는 문제없고 공급이 병목'이라는 서사를 쓰는 만큼, 그 병목의 해결자가 우리라는 자리매김이 톤의 핵심이다.\n\n## 6. 한 줄 결론\n\n서버 3사가 사상 최대 백로그와 '메모리가 최대 병목'이라는 진술로 메모리 공급자 우위를 스스로 증언한 지금, SK하이닉스는 고정가 다년 계약의 유혹을 피하고 '공급 확실성'을 프리미엄으로 파는 가격·계약·메시징 전략을 밀어붙여야 한다.\n\n### 출처\n\n**Super Micro (1차)**\n- [Supermicro IR — Q3 FY2026 실적 보도자료 (2026-05-05)](https://ir.supermicro.com/news/news-details/2026/Supermicro-Announces-Third-Quarter-Fiscal-Year-2026-Financial-Results/default.aspx)\n- [Supermicro — Q3 FY2026 컨콜 준비 발언 PDF](https://s204.q4cdn.com/707617056/files/doc_financials/2026/q3/SMCI-Q32 c.com/2026/05/28/dell-q1-earnings-report-2027.html)\n- [Motley Fool — Dell Q1 FY2027 컨콜 전사](https://www.fool.com/earnings/call-transcripts/2026/05/28/dell-dell-q1-2027-earnings-call-transcript/)\n- [Yahoo Finance — Dell Q1 컨콜 전사](https://finance.yahoo.com/markets/stocks/articles/dell-dell-q1-2027-earnings-221639763.html)\n- [Yahoo Finance — Dell Q1 컨콜 하이라이트(백로그 $51.3B)](https://finance.yahoo.com/markets/stocks/articles/dell-technologies-q1-earnings-call-220710464.html)\n- [Futurum — Dell Q1 FY2027 분석](https://futurumgroup.com/insights/dell-q1-fy-2027-ai-server-demand-drives-raised-fy-2027-outlook/)\n- [TIKR — Dell Q1 FY2027 분석](https://www.tikr.com/blog/dell-technologies-reports-43-8b-revenue-and-beats-street-by-8-billion-in-q1-2027)\n- [Blocks & Files — Dell AI서버 분석](https://www.blocksandfiles.com/ai-ml/2026/05/29/dells-extraordinary-ai-server-revenue-acceleration/5248541)\n\n**HPE (1차·2차)**\n- [HPE IR — FY2026 2분기 실적 보도자료 PDF (2026-06-01)](https://investors.hpe.com/~/media/Files/H/HP-Enterprise-IR/documents/q2-2026/q2-2026-earnings-press-release.pdf)\n- [CNBC — HPE Q2 실적 기사](https://www.cnbc.com/2026/06/01/hpe-stock-earnings-q2.html)\n- [Quartz — HPE Q2 실적·컨센서스](https://qz.com/hpe-earnings-record-revenue-ai-server-demand-060126)\n- [Yahoo Finance — HPE Q2 컨콜 전사](https://finance.yahoo.com/quote/HPE/earnings/HPE-Q2-2026-earnings_call-592596.html)\n- [GuruFocus — HPE Q2 컨콜 하이라이트](https://www.gurufocus.com/news/8895025/hewlett-packard-enterprise-co-hpe-q2-2026-earnings-call-highlights-record-revenue-and-strong-ai-demand-propel-growth)\n- [Futurum — HPE Q2 FY2026 분석](https://futurumgroup.com/insights/hpe-q2-fy-2026-ai-orders-remain-strong-as-supply-constraints-persist/)\n- [Investing.com — HPE Q1 FY2026 컨콜 전사(메모리 원가 발언)](https://www.investing.com/news/transcripts/earnings-call-transcript-hpe-beats-q1-2026-eps-forecast-by-12-stock-dips-93CH-4550906)\n\n**메모리 산업 맥락(국내)**\n- [뉴데일리 — HBM 쏠림에 D램 품귀 (2026-06-26)](https://biz.newdaily.co.kr/site/data/html/2026/06/26/202606260 icrosoft만 분기 명칭이 다르고, 연간 캐펙스 발언이 캘린더 기준인지 회계연도 기준인지 매체마다 표기가 달라 위 ⚠️를 유지한다.\n\n---\n\n## 1. Meta — 정량 요약\n\n**손익 (CY26 Q1, 전년동기비)**\n\n| 지표 | 실적 | 성장/비교 | 컨센서스 대비 |\n|---|---|---|---|\n| 매출 | $56.31B | +33% | IBES $55.45B 대비 약 +1.6% 상회 |\n| Family of Apps 매출 | $55.91B (광고 ~$55B) | +33% | — |\n| Reality Labs 매출 | $402M | -2% | 퀘스트 부진, AI 글라스는 일간 사용자 3배 |\n| 영업이익 | $22.87B (마진 40.6%) | FoA +$26.90B / RL **-$4.03B** | — |\n| 순이익 / GAAP EPS | $26.77B / $10.44 | +61% | **일회성 세제 혜택 $8.03B 포함**(제외 시 EPS $3.13 낮음) |\n| 조정 EPS | $7.31 | +14% | LSEG $6.79 대비 **+7.7% 상회** |\n\n**운영·현금흐름 지표**\n\n| 지표 | 실적 | 비고 |\n|---|---|---|\n| DAP(일간 활동자) | 3.56B, +4% | **q/q 소폭 감소** — 이란 인터넷 차단, 러시아 WhatsApp 제한 탓. 컨센 하회 |\n| 광고 노출량 / 단가 | +19% / +12% | 물량·가격 동반 성장 |\n| 인당 매출(ARPP) | $15.66 | 컨센 $15.26 상회 (전분기 $16.56) |\n| 영업현금흐름 | $32.2B | — |\n| **분기 캐펙스**(파이낸스리스 포함) | **$19.84B** | 서버·데이터센터·네트워크 집중. 분기 수치는 컨센 하회 |\n| 현금성 자산 / 장기부채 | $81.18B / $58.75B | 배당 $1.35B 지급 |\n| 비해지성 계약 약정 | **$237.67B** | ⚠️ 분기 중 +$107B 증가 보도(Digitimes) — 확인 필요 |\n| 헤드카운트 | 77,986명, +1% | 효율화 명분 감원 계획 보도(DCD) |\n\n**가이던스**\n\n| 항목 | 내용 |\n|---|---|\n| Q2 2026 매출 | $58~61B (중간값 성장 약 +25%, 환율 +2%p 순풍 가정) |\n| FY26 총비용 | $162~169B — **기존 유지** |\n| FY26 영업이익 | 2025년 영업이익 상회 목표 유지 |\n| **FY26 캐펙스** | **$125~145B로 상향**(기존 $115~135B) — 사유: **부품 가격 상승(특히 메모리)** + 미래 용량용 데이터센터 비용 |\n| 세율 | 잔여 분기 13~16% |\n\n발표 직후 주가는 시간외에서 약 7% 내렸다. 매출·이익이 컨센을 넘었는데도, 시장은 캐펙스 상향과 유저 지표 부진에 더 무게를 뒀다.\n\n---\n\n## 2. Meta — 컨콜 정성(톤) 발췌 분석\n\n**(1) 자신감 — 슈퍼인텔리전스 내러티브를 전면에 세웠다**\n\n- ① 원문(회사 보도자료, Zuckerberg): *\"We're on track to deliver personal superintelligence to billions of people.\"*\n- ② 해석: 수십억 명에게 개인용 슈퍼인텔리전스를 전달하는 경로 위에 있다고 말했다. Meta Superintelligence Labs가 만든 첫 모델(Muse Spark)을 이번 분기 성과의 중심에 놓았다.\n- ③ 시사점: 광고 실적이 아니라 AI 모델 진척을 분기 서사의 앞에 세웠다. 캐펙스 정당화 논리가 '광고 ROI'에서 '슈퍼인텔리전스 선점'으로 옮겨가는 중이다. 메모리 관점에서는 지출 하방 경직성을 높이는 신호다.\n\n**(2) 투자 확신 + 실리콘 다변화 — 이번 컨콜에서 가장 중요한 대목**\n\n- ① 원문(Fortune이 전한 Zuckerberg 발언, 원문 1:1 대조 미완료): *\"Every sign that we're seeing in our own work and across the industry gives us confidence in this investment\"*\n- ② 해석: 자사 내부와 업계 전반에서 보는 모든 신호가 이번 투자에 확신을 준다고 했다. 이어서 Broadcom과 함께 개발한 자체 실리콘을 1기가와트 넘게 배치하고, Nvidia 신규 시스템을 보완하려고 AMD 칩도 대량 도입한다고 밝혔다.\n- ③ 시사점: 지출 확신과 비용 효율화를 한 문장 안에 묶었다. GPU 공급선을 Nvidia 단일에서 Nvidia+AMD+자체 ASIC 3원 체제로 바꾸는 그림인데, 커스텀 ASIC도 HBM을 탑재하므로 **메모리 수요에는 중립 이상**이다. 오히려 고객 저변이 넓어진다.\n\n**(3) 캐펙스 상향 사유 — '메모리 가격'을 이름 붙여 불렀다**\n\n- ① 원문(실적 릴리스 문구, Tom's Hardware 인용): *\"higher component pricing this year, particularly memory\"*\n- ② 해석: 캐펙스 상향분(구간 기준 +$10B)의 주 사유가 용량 확장이 아니라 **부품, 특히 메모리 가격 상승**이라고 못박았다.\n- ③ 시사점: 메모리 애널리스트에게는 이번 시즌 최고 수위 발언이다. 구매자가 가격 인상을 받아들이고 예산을 늘렸다고 스스로 공시했다. DRAM 계약가 협상에서 공급자(삼성전자·SK하이닉스·마이크론) 우위가 재확인됐다.\n\n**(4) 2027년 캐펙스 — 확신 속의 유보**\n\n- ① 원문(회사 전사 PDF, Zuckerberg): *\"we are, frankly, undergoing a very dynamic planning process\"*\n- ② 해석: 2027년 이후 용량 수요를 두고 매우 유동적인 계획 과정을 거치고 있다고 했다. 모델 출시 주기도 경쟁 정보라며 말을 아꼈고, 연구는 언제 성과가 나올지 모른다고 덧붙였다.\n- ③ 시사점: 확신(투자 지속)과 유보(규모 미확정)를 같이 담았다. 2027년 가이던스가 나오는 10월~내년 1월 컨콜이 메모리 주문 가시성의 다음 분수령이다. 경쟁사(Alphabet·Microsoft)가 이미 2027년 증액을 예고한 점과 대비하면 Meta 톤이 상대적으로 조심스럽다.\n\n**(5) 신중 신호 — 규제·유저 지표**\n\n- ① 원문: 별도 인용 없음(보도자료 요지). 회사는 EU·미국 규제 역풍, 청소년 관련 재판에서 중대한 손실 가능성을 명시했고, DAP는 이란·러시아 요인으로 전분기보다 줄었다.\n- ② 해석: 성장 서사와 별개로 법률 리스크 문단의 수위를 유지했고, 유저 감소를 외부 요인으로 설명했다.\n- ③ 시사점: 광고 매출의 물량 엔진(노출량 +19%)이 유저 수가 아니라 체류시간·AI 추천에서 나온다는 구조를 재확인했다. 메모리 수요 관점의 직접 영향은 작다.\n\n**(6) 분기 후 신호 — 컴퓨트 외판 가능성**\n\n- ① 원문(CNBC, 5/27, Zuckerberg): 클라우드 사업 진출이 *\"definitely on the table\"*\n- ② 해석: 남는 컴퓨트를 외부에 파는 클라우드 사업을 선택지에 올려놓았다고 말했다.\n- ③ 시사점: 실현되면 Meta 인프라 투자가 '내부 소비형'에서 '매출 창출형'으로 바뀐다. 과잉 투자 우려를 되사는 카드이자, 인프라(=메모리) 구매의 상한을 한 단계 높일 재료다.\n\n---\n\n## 3. 경쟁 현황 — 정량 비교 (모두 CY26 Q1, 2026-03-31 종료 분기)\n\n| 지표 | Meta | Alphabet | Microsoft (FY26 Q3) | Amazon | 핵심 차이(1줄) |\n|---|---|---|---|---|---|\n| 매출 / 성장 | $56.3B / +33% | $109.9B / +22% | $82.9B / +18% | $181.5B / +17% | 성장률은 Meta, 절대 규모는 Amazon 우위 |\n| 매출 컨센 대비 | 상회 (+1.6%) | 상회 (+2.5%) | 상회 (+1.8%) | 상회 (+2.4%) | 네 회사 모두 매출 상회, 상회 폭은 대동소이 |\n| 영업이익 / 마진 | $22.9B / 40.6% | $39.7B / 36.1% | $38.4B / 46.3% | $23.9B / 13.1%(사상 최고치) | 마진 수준은 MS 최고, 마진 개선 폭은 Amazon 최대 |\n| 조정 EPS vs 컨센 | $7.31 vs $6.79 상회 | ⚠️ $2.62 vs $2.63 소폭 하회 | $4.27 vs $4.06 상회 | $2.78 vs $1.65 상회(Anthropic 평가익 $16.8B 포함) | EPS 서프라이즈의 질은 MS가 가장 깨끗, Meta·Amazon은 일회성 항목 포함 |\n| 클라우드·핵심 성장축 | FoA 광고 +33% | Cloud $20.0B **+63%**, 백로그 $462B | Azure **+40% cc**(5분기 연속 가속), AI 런레이트 $37B+ | AWS $37.6B +28%(15분기 최고), AWS 영업이익 $14.2B | 클라우드 성장 속도 Google > MS > AWS, Meta만 클라우드 부재 |\n| 분기 캐펙스 | $19.8B | $35.7B(약 2배 증가) | $31.9B(+49%, 컨센 하회) | $43.2B | 절대 지출은 Amazon 최대, Meta는 4사 중 최소 |\n| 2026 연간 캐펙스 | $125~145B(상향) | $180~190B(상향), 2027 대폭 증액 예고 | 약 $190B(⚠️CY 기준, 컨센 $154.6B 대비 +$35B) | 약 $200B | 상향 서프라이즈 폭은 MS 최대, 절대 규모는 Amazon 최대 |\n| 메모리·부품 발언 | 상향 사유로 \"메모리\" 명시 | 부품 직접 언급보다 공급 제약·2027 증액 강조 | **$25B를 부품(메모리) 인플레로 명시 계량** | 메모리·스토리지 비용 급등 언급, 파트너십으로 물량 선확보 | 메모리 인플레를 숫자로 밝힌 회사는 MS( $25B)가 유일 |\n| 커스텀 실리콘 | MTIA(Broadcom) 1GW+ 배치, AMD 병행 | TPU — **하드웨어 외판 개시**, 백로그에 반영 | Maia 200(TSMC 3nm)·Cobalt 확산 | Trainium — 실리콘 사업 런레이트 $20B+, q/q +40% | 실리콘의 '사업화'는 Amazon·Google이 앞서고 Meta·MS는 내부 효율용 |\n| 발표 후 주가 | 시간외 -7% | 시간외 +7% | 다음날 -3.9% | 시간외 -2% 안팎 | 같은 캐펙스 상향인데 클라우드 매출 증거가 있는 Alphabet만 보상받음 |\n\n> 4사 합산 CY2026 캐펙스는 약 $725B로 전년보다 77% 늘어난다는 집계(Tom's Hardware)가 있다. TrendForce 기준 Q1 DRAM 계약가는 q/q 약 +95%, Q2는 +58~63% 전망, NAND Q2는 +70~75% 전망이며 2026년 NAND 생산분은 전량 선약정됐다는 보도가 있다.\n\n---\n\n## 4. 경쟁 현황 — 정성(톤) 비교\n\n| 축 | Meta | Alphabet | Microsoft | Amazon | 핵심 차이(1줄) |\n|---|---|---|---|---|---|\n| 톤·자신감 | 확신 상향 — \"모든 신호가 투자 확신을 준다\"(§2-(2)) | 확신 최고조 — Pichai: *\"Our enterprise AI solutions have become our primary growth driver for cloud for the first time in Q1\"* | 확신 유지·비용 방어 — AI 마진이 초기 클라우드보다 낫다고 강조 | 확신 상향 — Jassy: *\"in the middle of some of the biggest inflections of our lifetime\"* | 매출 증거로 말하는 Alphabet·Amazon, 미래 서사로 말하는 Meta |\n| 내러티브 중심 | 개인용 슈퍼인텔리전스 + 자체 모델(Muse Spark) | 풀스택(모델+TPU+클라우드) — Pichai: *\"revenue from products built on our gen AI models grew nearly 800% year-over-year\"* | Copilot·Azure AI 수익화 + 실리콘 내재화 | AWS 재가속 + OpenAI 계약 확대 + 자체 칩 사업화 | Meta만 '외부 판매 없는 내부 투자' 서사 — 그래서 시장이 가장 박하게 평가 |\n| 공급관(용량 제약) | 용량 계획 유동적, 2027 미확정(§2-(4)) | 공급 제약이 성장의 관문이라고 인정, 백로그 $462B — Ashkenazi: *\"just over half of it will convert to revenue in the next 24 months\"* | GPU·CPU·스토리지 제약이 2026년 내내 지속된다고 명시(Tom's Hardware 전언) | 공급을 파트너십으로 선확보했다고 강조 | 4사 모두 '수요 > 공급' 인정 — 공급자 우위 사이클 지속 신호 |\n| 가격·비용 구조 | 메모리 인플레를 캐펙스 상향 사유로 명시 | 부품보다 용량·감가상각 중심 화법 | Hood: *\"The sequential increase includes roughly $5 billion from higher component pricing\"* — 인플레를 분기 단위로 계량 | 메모리·스토리지 급등 인정, 지속되면 마진 위험이라고 유보 | 부품 인플레 수용도: MS·Meta 명시 > Amazon 유보 > Alphabet 침묵 |\n| 점유율 태도 | 광고 점유 방어보다 AI 선점 공세 | 검색 방어 성공 선언(Search +19% 가속) + 클라우드 공세 | Azure 가속으로 AWS 추격 공세 | 수성 — AWS 재가속과 OpenAI $100B 증액 계약으로 리더십 재확인 | 클라우드 3사는 상호 공세, Meta는 다른 링(광고·AI)에서 경기 중 |\n| 투자 기조 | 상향하되 2027은 유보 | 상향 + 2027 대폭 증액 선예고 | 상향 폭 최대(컨센 +$35B), 분기 $40B+ 예고 | 절대 규모 최대($200B), FCF 압박 감수 명시 | 지출 규율 신호는 4사 어디에도 없다 — 다운사이클 트리거 아직 부재 |\n\n---\n\n## 5. 바이사이드 애널리스트를 위한 임플리케이션\n\n**렌즈 1. 가이던스 대비 실적 — 서프라이즈의 질을 가려 읽어야 한다**\n- Meta는 매출·조정 EPS 모두 상회했으나, GAAP EPS 급증($10.44)은 세제 혜택 $8.03B가 만든 착시다. 반복 가능한 서프라이즈는 광고 단가 +12%와 노출량 +19%의 동반 성장뿐이다.\n- 네 회사 모두 매출을 상회하고도 세 회사 주가가 내렸다. 시장의 채점 기준이 이미 손익에서 **캐펙스·FCF 궤적**으로 옮겨갔다. 메모리 업체를 볼 때도 같은 기준을 적용해야 한다. 매출 서프라이즈보다 '가격 수용성의 지속 기간'이 멀티플을 결정한다.\n\n**렌즈 2. 마진 구조 — 가격 효과와 물량 효과의 분해**\n- 이번 시즌의 핵심 발견: 하이퍼스케일러 캐펙스 상향분의 상당 부분이 **물량(용량)이 아니라 가격(부품 인플레)** 이다. Microsoft는 $25B, Meta는 상향분 $10B의 주 사유를 메모리 가격이라고 밝혔다.\n- 메모리 3사에 주는 함의는 이중적이다. (+) ASP 인상을 최대 구매자가 공개적으로 수용했다 — Q1 DRAM 계약가 +95% q/q라는 외부 집계와 정합한다. (−) 캐펙스 총액 성장률(+77%)을 비트 수요 성장률로 직역하면 안 된다. 가격 인플레 부분을 걷어낸 실질 물량 성장은 그보다 낮다.\n- 계약 구조 관점에서는 Amazon의 '전략적 파트너십을 통한 물량 선확보', NAND 2026년 생산분 전량 선약정 보도가 중요하다. 장기·고정성 계약 비중이 커질수록 메모리 업체의 다음 다운사이클 방어력이 높아진다. LTA(장기공급계약) 조건 공시를 추적 항목으로 올린다.\n\n**렌즈 3. 캐펙스·공급 규율 — 다음 다운사이클의 트리거 점검**\n- 현재 확인되는 트리거는 없다. 4사 모두 상향했고, Alphabet·Microsoft는 2027년 추가 증액까지 예고했다. Meta의 비해지성 약정 $237.67B는 지출의 하방 경직성을 계약으로 굳혔다.\n- 다만 선행 경계 신호 세 가지를 상시 점검한다. ① **감가상각 파도** — 동시 투자가 2027~28년 손익을 일제히 누른다(Global Data Center Hub 지적). FCF 압박이 임계치를 넘으면 지출 규율이 갑자기 등장한다. ② **부품 인플레의 수요 파괴** — 하이퍼스케일러가 소비자 DRAM·NAND 물량을 밀어내는 구조라, PC·모바일 수요 훼손이 사이클 왜곡을 만들 수 있다. ③ **Meta의 2027 유보** — 4사 중 유일하게 2027년 증액을 확언하지 않았다. Meta가 처음으로 '효율'을 말하는 순간(감원 보도는 그 예고편일 수 있다)이 사이클 톤 전환의 조기 경보다.\n- 커스텀 실리콘 확산(MTIA·Maia·Trainium·TPU)은 Nvidia 물량 배분에는 변수지만, HBM 수요에는 중립 이상이다. ASIC도 HBM을 탑재하며, 구매 주체가 늘어날수록 메모리 협상 상대가 다변화된다. Broadcom 라인(Meta MTIA, Google TPU)의 HBM 조달처 추적이 필요하다.\n\n**렌즈 4. 경영진 톤 변화 — 말과 숫자의 괴리**\n- Meta: 말(슈퍼인텔리전스 확신)과 숫자(RL 분기 손실 $4.03B, DAP q/q 감소, FCF 압축)의 괴리가 4사 중 가장 크다. 시장은 그 괴리에 -7%로 답했다. 다만 메모리 수요 관점에서는 괴리가 클수록 지출이 늘므로 나쁘지 않다.\n- Alphabet: 말과 숫자가 가장 잘 붙는다. 클라우드 +63%, 백로그 $462B, TPU 외판이라는 매출 증거가 캐펙스를 정당화했고, 홀로 주가 보상을 받았다.\n- Microsoft: 톤은 차분하나 숫자가 가장 공격적이다(컨센 대비 +$35B). 부품 인플레를 계량 공시한 유일한 회사로, 메모리 가격 전망의 벤치마크 발언으로 삼을 만하다.\n- Amazon: 낙관 톤과 사상 최고 마진이 일치하나, 인플레 지속 시 마진 위험이라는 유보를 남겼다. 4사 중 처음으로 '비용 전가의 한계'를 시사한 발언이라 다음 분기 톤 변화를 주시한다.\n\n**렌즈 5. 상대 밸류에이션 — 멀티플 근거의 변화**\n- 하이퍼스케일러 내부: 같은 캐펙스 상향이라도 '클라우드 매출 증거 보유'(Alphabet·Amazon)와 '내부 소비형'(Meta·Microsoft Copilot 초기 단계)의 멀티플 차별화가 진행 중이다. Meta 멀티플 회복의 조건은 컴퓨트 외판(\"definitely on the table\") 구체화 또는 2027 캐펙스와 ROI 증거의 동시 제시다.\n- 메모리 3사: 이번 시즌은 프리미엄 근거를 강화했다. 구매자가 가격을 수용하고, 공급 제약을 인정하고, 2027년 증액을 예고했다. HBM·서버 DRAM 노출이 큰 SK하이닉스, 가격 탄력이 큰 마이크론에 유리한 조합이다. 다만 계약가 급등 구간의 피크 멀티플 압축 위험을 감안해, '가격 모멘텀'보다 '약정 물량·기간'을 상대 비교 축으로 삼는다.\n\n## 6. 한 줄 결론\n\nMeta의 CY26 Q1은 광고가 낸 깨끗한 비트(매출 +33%)보다 \"캐펙스 상향의 사유가 메모리 가격\"이라는 공시 한 줄이 더 중요했다 — 4사 캐펙스 $725B 시대에 하이퍼스케일러는 메모리 가격의 수용자가 됐고, 이는 메모리 3사 강세 논거를 계약으로 굳히는 신호이되, 물량과 가격을 분해하지 않은 낙관은 금물이다.\n\n### 출처\n\n**Meta (1차)**\n- [Meta Reports First Quarter 2026 Results — PR Newswire(회사 보도자료)](https://www.prnewswire.com/news-releases/meta-reports-first-quarter-2026-results-302757852.html)\n- [Meta Q1 2026 Earnings Call Transcript — 회사 게시 PDF(q4cdn)](https://s21.q4cdn.com/399680738/files/doc_financials/2026/q1/META-Q1-2026-Earnings-Call-Transcript.pdf)\n- [Meta 10-Q (SEC EDGAR)](https://www.sec.gov/Archives/edgar/data/0001326801/000162828026028526/meta-20260331.htm)\n- [Meta IR 보도자료 페이지](https://investor.atmeta.com/investor-news/press-release-details/2026/Meta-Reports-First-Quarter-2026-Results/d)\n\n**Meta (2차)**\n- [CNBC — Meta Q1 2026 earnings report](https://www.cnbc.com/2026/04/29/meta-q1-earnings-report-2026.html)\n- [StockTitan — META 10-Q 요약](https://www.stocktitan.net/sec-filings/META/10-q-meta-platforms-inc-quarterly-earnings-report-3bd7ce5dd651.htm)\n- [TIKR — Meta Q1 2026 분석](https://www.tikr.com/blog/meta-platforms-q1-2026-33-revenue-growth-as-ai-investment-hits-145b)\n- [Fortune — Meta capex $145B](https://fortune.com/2026/04/29/meta-zuckerberg-145-billion-ai-spending-roi/)\n- [Motley Fool — Meta Q1 2026 컨콜 전사](https://www.fool.com/earnings/call-transcripts/2026/04/29/meta-meta-q1-2026-earnings-call-transcript/)\n- [Digitimes — Meta 1Q26 하드웨어 공급망 분석](https://www.digitimes.com/news/a20260430VL219/meta-2026-earnings-hardware-infrastructure.html)\n- [heygotrade — Meta Q1 2026 리액션](https://www.heygotrade.com/en/blog/meta-q1-2026-earnings-reaction/)\n- [Global Data Center Hub — Meta $145B 리셋](https://www.globaldatacenterhub.com/p/meta-q1-2026-the-145b-reset-and-the)\n- [DCD — Meta 캐펙스 상향·감원 계획](https://www.datacenterdynamics.com/en/news/meta-raises-planned-capex-for-2026-plans-layoffs-for-efficiency-reasons)\n- [CNBC — Zuckerberg, 클라우드 사업 \"on the table\" (5/27)](https://www.cnbc.com/2026/05/27/mark-zuckerberg-says-meta-starting-cloud-business-on-the-table.html)\n\n**Alphabet**\n- [Alphabet Q1 2026 실적 릴리스 PDF(회사 게시)](https://s206.q4cdn.com/479360582/files/doc_financials/2026/q1/2026q1-alphabet-earnings-release.pdf)\n- [CNBC — Alphabet Q1 2026 earnings](https://www.cnbc.com/2026/04/29/alphabet-googl-q1-2026-earnings.html)\n- [9to5Google — Alphabet Q1 2026](https://9to5google.com/2026/04/29/alphabet-q1-2026-earnings/)\n- [Google 블로그 — Pichai 실적 메시지](https://blog.google/company-news/inside-google/message-ceo/alphabet-earnings-q1-2026/)\n- [Motley Fool — Alphabet Q1 2026 컨콜 전사](https://www.fool.com/earnings/call-transcripts/2026/04/29/alphabet-googl-q1-2026-earnings-call-transcript/)\n- [heygotrade — Alphabet Q1 2026 리액션](https://www.heygotrade.com/en/blog/alphabet-q1-2026-earnings-reaction/)\n\n**Microsoft**\n- [Microsoft 공식 보도자료 — FY26 Q3](https://news.microsoft.com/source/2026/04/29/microsoft-cloud-and-ai-strength-fuels-third-quarter-results/)\n- [Microsoft 8-K (SEC EDGAR)](https://www.sec.gov/Archives/edgar/data/0000789019/000119312526191457/msft-ex99_1.htm)\n- [CNBC — Microsoft $190B capex, 메모리 가격](https://www.cnbc.com/2026/04/29/microsoft-msft-q3-earnings-report-2026.html)\n- [Tom's Hardware — 빅테크 캐펙스 $725B와 메모리 인플레](https://www.tomshardware.com/tech-industry/big-tech/microsoft-attributed-25-billion-of-its-record-ai-budget-to-memory-chip-costs)\n- [Global Data Center Hub — Microsoft $190B 캐펙스 플랜](https://www.globaldatacenterhub.com/p/microsoft-q3-fy2026-the-190b-capex)\n- [Fortune — MS·Meta·Google 캐펙스 비교](https://fortune.com/2026/04/29/microsoft-meta-google-ai-capex-spending-billions/)\n\n**Amazon**\n- [CNBC — AWS Q1 2026](https://www.cnbc.com/2026/04/29/aws-earnings-q1-2026.html)\n- [QZ — Amazon Q1 2026](https://qz.com/amazon-q1-2026-earnings-aws-cloud-growth-042926)\n- [TIKR — Amazon 사상 최고 영업마진](https://www.tikr.com/blog/amazon-posts-181-5b-revenue-and-highest-operating-margin-in-company-history)\n- [CoinDCX — Amazon Q1 2026 결과](https://coindcx.com/blog/us-stock/amazon-q1-2026-earnings-results/)"}, {"id": "2026-07-02_dram-big3_pilot", "title": "DRAM 빅3 비교 — 마이크론 FQ3'26 vs 삼성전자·SK하이닉스 CY1Q'26", "date": "2026-07-02", "target": "DRAM Big 3 (Micron·Samsung·SK hynix)", "persona": "neutral_dram_observer", "scope": "", "quarter": "Micron FQ3'26 (2026-03~05) / Samsung·SK CY1Q'26 (2026-01~03)", "md": "# DRAM 빅3 비교 — 마이크론 FQ3'26 vs 삼성전자·SK하이닉스 CY1Q'26\n\n**파일럿 케이스.** 관점은 중립(DRAM 시장 관찰자)이며, 세 회사를 같은 프레임으로\n대칭 비교한다. 분석 축은 ① 분기 정량 ② DRAM 세부(ASP·점유율) ③ 컨콜 톤(원문\n발췌) ④ 항목별 차이 ⑤ 시사점.\n\n## 기간 정합성 — 회계연도(FY) ↔ 달력연도(CY) 매핑\n\n| 회사 | 보고 분기 | 실제 기간 | 발표일 | 시점 차이 |\n|---|---|---|---|---|\n| Micron | FY2026 3분기(FQ3'26) | **2026-03 ~ 2026-05** (5/28 마감) | 2026-06-24 | 기준점(가장 최신) |\n| SK하이닉스 | CY2026 1분기(1Q26) | **2026-01 ~ 2026-03** | 2026-04-23 | 마이크론보다 약 2개월 과거 |\n| 삼성전자 | CY2026 1분기(1Q26) | **2026-01 ~ 2026-03** | 2026-04-30 | 마이크론보다 약 2개월 과거 |\n\n가격이 매달 오르는 국면이라 **2개월 차이가 마진·ASP를 크게 벌린다.** 마이크론\n수치가 더 좋게 보이는 부분 상당수는 시점 효과다. 직접 비교하는 표에는 이 점을\n매번 표시했다. 삼성·SK의 CY2Q'26(4~6월) 실적은 7월 말 발표 예정이라 이 보고서에\n없다.\n\n## 데이터 신뢰도\n\n- 세 회사 IR 원문(마이크론 prepared remarks PDF, SK하이닉스 뉴스룸, 삼성 뉴스룸)이\n  모두 HTTP 403으로 막혔다. 수치는 복수 매체로 교차 확인했고, **발언 발췌는 2차\n  전사 기준이라 원문 1:1 대조를 못 했다.** 어절 단위 정확성이 필요하면 IR 원문\n  대조가 필요하다.\n- ⚠️ 표시 항목은 매체 간 수치가 다르거나 기간 기준이 명시되지 않아 확인이 필요하다.\n\n## 1. 분기 스코어보드 (정량)\n\n| 지표 | Micron FQ3'26 | SK하이닉스 1Q26 | 삼성전자 1Q26 |\n|---|---|---|---|\n| 매출 | $41.46B (+346% YoY) | ₩52.58T ≈ $35.5B (+198% YoY, +60% QoQ) | ₩133.9T ≈ $90.6B (+69% YoY) — 전사 |\n| 그중 메모리/DRAM | DRAM $31.3B (매출의 76%) | 전사가 사실상 메모리 | 메모리 매출 ₩74.8T (DS ₩81.7T 중) |\n| 영업이익 | $33.68B (non-GAAP, 마진 81.2%) | ₩37.61T (마진 72%) | 전사 ₩57.23T (+755% YoY), DS ₩53.7T (마진 약 66%) |\n| 순이익/EPS | EPS $25.11 (non-GAAP) | 순이익 ₩40.35T ⚠️ | — |\n| 다음 분기 가이던스 | 매출 $50B±1B, GM ~86%, EPS $31±1 | 공식 수치 가이던스 없음(수요 초과 지속 전망) | 공식 수치 가이던스 없음(2Q 수요 강세 전망) |\n\n⚠️ SK하이닉스는 순이익(₩40.35T)이 영업이익(₩37.61T)보다 크다. 영업외 이익이\n포함된 것으로 보이나 원문을 확인하지 못했다.\n\n주의: 마이크론 마진은 non-GAAP, 한국 두 회사는 K-IFRS 영업이익이라 **기준이 달라\n절대 비교는 참고용**이다. 여기에 2개월 시점 차이(그 사이 가격 급등)까지 겹친다.\n\n## 2. DRAM 세부 — ASP·점유율\n\n### 분기 ASP 변화 (QoQ)\n\n| 회사 | DRAM ASP 변화 | 기간 |\n|---|---|---|\n| Micron | +low-60%대 (비트 출하는 한 자릿수 초반 증가) | FQ3'26 (3~5월) |\n| SK하이닉스 | +mid-60%대 | 1Q26 (1~3월) |\n| 삼성전자 | ⚠️ \"+146%\" 보도 있으나 QoQ/YoY 기준 미확인 | 1Q26 (1~3월) |\n\n세 회사 모두 \"출하보다 가격\"이 성장을 끌었다. 참고로 PC DRAM 고정거래가는 2026년\n3월 $13로 11개월 연속 올랐다.\n\n### CY1Q'26 DRAM 매출 점유율 (Omdia 기준, 달력분기로 환산 집계)\n\n| 회사 | DRAM 매출 | 점유율 | QoQ 변화 |\n|---|---|---|---|\n| 삼성전자 | $37.4B | **38.6%** (1위) | +2.1pp (36.5%→38.6%) |\n| SK하이닉스 | $28.0B | 28.8% (2위) | −4.1pp (32.9%→28.8%) |\n| Micron | $21.7B | 22.4% (3위) | −0.4pp (22.8%→22.4%) |\n\n- TrendForce 집계도 삼성 38.5%로 거의 같다. 삼성이 톱3 중 ASP 상승 폭이 가장\n  컸고 서버 DRAM 매출 비중도 가장 컸다는 평가다.\n- HBM만 보면 순위가 뒤집힌다: **SK하이닉스가 56.4%로 1위**(1Q26 기준).\n- 정리하면 1Q26의 그림은 \"범용 DRAM 가격 급등 국면에서 삼성이 전체 DRAM 1위\n  격차를 약 10pp로 벌렸고, HBM 주도권은 여전히 SK하이닉스\"다.\n\n## 3. 컨콜 톤 비교 — 원문 발췌\n\n발췌는 모두 2차 전사 기준(원문 1:1 대조 미완료).\n\n### Micron — \"사이클을 계약으로 끝냈다\"는 톤\n\n> \"(We are) very pleased with our HBM4 product and Micron's shipments already of HBM4 of over $1 billion.\" — Sanjay Mehrotra, FQ3'26 콜\n\n> \"Supply shortages in memory and storage will take considerable time to improve, even as we expect industry supply to improve gradually in 2028.\"\n\n- 16건의 장기 공급계약(SCA)이 핵심 메시지다. 잔여 계약액(RPO) 약 **$100B**,\n  take-or-pay에 가격 하한까지 걸어 \"역대 최고 마진보다 높은 수준을 보장\"한다고\n  했다. 실적 서프라이즈보다 **계약 구조로 사이클 변동성 자체를 없앴다**는 서사에\n  힘을 실었다.\n- 공급이 수요를 따라잡을 시점은 \"가시성이 없다\"고 했고, 신규 팹 의미 있는 출하는\n  FY2028에나 가능하다고 못 박았다.\n\n### SK하이닉스 — \"구조적 역전, 과잉공급 위험은 관리된다\"는 톤\n\n> \"Despite supply expansion, demand structurally outpaces supply. Long-term visibility from customer partnerships reduces oversupply risk.\" — 김우현 CFO, 1Q26 콜\n\n> \"The importance of memory has become greater than ever ... as this supply-demand imbalance persists, customers are prioritizing procurement over price.\" — 경영진, 1Q26 콜\n\n- 2026년 HBM 물량은 완판이고 부족은 2027년까지 이어진다고 봤다. HBM4E는 하반기\n  샘플, 2027년 양산 목표다.\n- 용인 1기 클린룸 오픈을 2027년 2월로 3개월 당겼다. \"수요는 구조적, 공급 확대는\n  계획대로\"라는 수성(守成)형 메시지다. 고객이 가격보다 물량 확보를 우선한다는\n  발언은 가격 협상력이 완전히 공급자에게 넘어왔다는 뜻이다.\n\n### 삼성전자 — \"부족은 더 심해진다, 범용도 우리 무기\"라는 톤\n\n> (2차 전사 요지) 공급은 이미 수요에 크게 못 미치고, **이미 받은 주문 기준으로\n> 2027년의 수급 격차는 2026년보다 더 벌어진다.** — 김재준 메모리사업부장, 1Q26 콜\n\n- 셋 중 공급 부족 경고가 가장 셌다. 2026년 HBM 매출을 전년의 3배 이상으로 늘린다는\n  계획도 밝혔다.\n- 특이점은 **\"요즘은 범용 DRAM이 HBM보다 수익성이 좋다\"**는 취지의 발언이다.\n  HBM 후발이라는 약점을 범용 DRAM 초강세 국면이 상쇄해 주는 지금 구도를\n  솔직하게 드러냈다. 2월에 HBM4 양산을 시작(엔비디아 베라 루빈향)했다는 점도\n  강조했다. ⚠️ HBM4 단가 $500~560, 마진 80% 이상이라는 보도는 매체 추정이다.\n\n## 4. 항목별 비교 — 같은 항목, 같은 톤으로\n\n| 항목 | Micron | SK하이닉스 | 삼성전자 | 핵심 차이 |\n|---|---|---|---|---|\n| 성장 서사 | 사이클 종식을 계약($100B RPO)으로 증명 | 구조적 수급 역전 + 장기 가시성으로 수성 | 부족 심화 경고 + 범용·HBM 양날개 | 마이크론은 **계약**, SK는 **구조**, 삼성은 **격차 확대 경고**를 앞세움 |\n| HBM 위치 | HBM4 누적 $1B, 램프가 HBM3E의 2배 속도 | 점유율 56.4% 1위, 2026 완판 | 2월 HBM4 양산 개시, 2026 매출 3배 계획 | 현재 1위는 SK, 추격 속도는 마이크론·삼성이 강조 |\n| 범용 DRAM | DRAM ASP +60%대(3~5월) | ASP +60%대 중반(1~3월) | 점유율 38.6%로 1위 격차 확대, ASP 상승 폭 최대 | 범용 가격 급등의 최대 수혜는 **삼성**(캐파·서버 DRAM 비중) |\n| 공급 전망 발언 | 정상화 \"가시성 없음\", 신규 팹은 FY28 | 부족 2027년까지, 용인 3개월 앞당김 | **2027년 격차가 2026년보다 커진다** | 셋 다 부족 지속. 경고 강도는 삼성 > 마이크론 > SK 순 |\n| 수익성(참고) | 영업마진 81.2% (non-GAAP, 3~5월) | 72% (K-IFRS, 1~3월) | DS 약 66% (K-IFRS, 1~3월) | 기준·시점이 달라 서열 단정 불가. 시점을 맞추면 격차는 줄어들 것 |\n| 가이던스 스타일 | 수치 가이던스(+21% QoQ 성장 제시) | 정성 전망만 | 정성 전망만 | 마이크론만 숫자로 자신감을 표현 — 미국식 관행 차이도 있음 |\n\n## 5. 시사점\n\n1. **세 회사 모두 \"부족 장기화\"를 말하지만 근거가 다르다.** 마이크론은 계약(RPO),\n   SK는 고객 파트너십 가시성, 삼성은 수주 잔량이다. 셋 다 자사에 유리한 프레임이라\n   교차 검증 지표(하이퍼스케일러 캐펙스, 웨이퍼 투입량)로 따로 확인해야 한다.\n2. **1Q26 점유율 이동은 '범용 DRAM 국면'의 산물이다.** 삼성의 +2.1pp는 HBM 역전이\n   아니라 범용 가격·캐파 효과다. HBM4/4E 전환이 본격화되는 2026 하반기~2027년에\n   점유율 그림이 다시 흔들릴 수 있다.\n3. **마이크론의 $100B take-or-pay는 업계 가격 구조를 바꾼다.** 가격 하한이 걸린\n   물량이 커질수록 다음 다운사이클의 바닥이 높아진다. 삼성·SK도 유사 계약을\n   요구받을 공산이 크고, 7월 말 2Q26 콜에서 확인할 첫 번째 포인트다.\n4. **다음 확인 시점: 삼성·SK의 CY2Q'26 발표(7월 말).** 마이크론 FQ3(3~5월)과\n   기간이 2개월 겹쳐, 이번 보고서에서 시점 차이로 유보한 마진·ASP 비교를 그때\n   제대로 맞춰볼 수 있다.\n\n## 6. 결론\n\n2026년 상반기 DRAM 시장은 \"공급자 시장\"이라는 말로도 부족한 초과수요 국면이다.\n같은 국면을 두고 세 회사의 화법이 갈린다. 마이크론은 계약으로 미래 마진을\n고정했다고 말하고, SK하이닉스는 구조적 우위를 지키고 있다고 말하며, 삼성은\n부족이 더 심해진다고 경고하면서 범용 DRAM 1위 격차를 벌렸다. 숫자는 셋 다\n사상 최고지만, **누가 이 사이클을 '구조'로 바꿔냈는지는 2027년 수급이 실제로\n어긋나는 순간 판가름 난다.**\n\n## Sources\n\n- [Micron FQ3'26 8-K press release (SEC)](https://www.sec.gov/Archives/edgar/data/0000723125/000072312526000013/a2026q3ex991-pressrelease.htm) · [Investing.com 콜 전사](https://www.investing.com/news/transcripts/earnings-call-transcript-micron-tops-q3-2026-estimates-shares-jump-146-93CH-4759504) · [CNBC](https://www.cnbc.com/2026/06/24/micron-mu-earnings-report-q3-2026.html) · [TechTimes](https://www.techtimes.com/articles/319032/20260625/micron-q3-2026-earnings-100b-contracts-signals-ai-memory-cycle-break.htm) · [Futurum](https://futurumgroup.com/insights/micron-q3-fy-2026-hbm-and-lpdram-drive-the-next-phase-of-ai-memory-growth/)\n- [SK hynix 1Q26 보도자료(뉴스룸)](https://news.skhynix.com/q1-2026-business-results/) · [CNBC](https://www.cnbc.com/2026/04/23/sk-hynix-earnings-ai-memory-shortage-hbm-demand.html) · [TechPowerUp](https://www.techpowerup.com/348448/sk-hynix-announces-1q26-financial-results) · [BigGo 콜 하이라이트](https://finance.biggo.com/news/KR_000660.KS_2026-04-23) · [StorageNewsletter](https://www.storagenewsletter.com/2026/04/29/sk-hynix-fiscal-1q26-financial-results/)\n- [삼성전자 1Q26 실적 발표(뉴스룸)](https://news.samsung.com/global/samsung-electronics-announces-first-quarter-2026-results) · [TechPowerUp](https://www.techpowerup.com/348675/samsung-q1-2026-results-memory-profit-up-nearly-50x-warns-of-2027-shortage) · [wccftech(범용 DRAM 수익성)](https://wccftech.com/samsung-q1-2026-earnings-conventional-dram-more-profitable-than-hbm-right-now/) · [DCD](https://www.datacenterdynamics.com/en/news/samsung-electronics-q1-26-operating-profit-exceeds-companys-fy25-full-year-total/)\n- 점유율: [TechTimes(Omdia 집계)](https://www.techtimes.com/articles/318052/20260609/samsung-leads-dram-market-share-386-sk-hynix-trails-revenue-tops-profit-margins.htm) · [TrendForce(ASP)](https://www.trendforce.com/news/2026/05/18/news-memory-supercycle-drives-1q26-price-surge-samsung-flags-146-asp-jump-sk-hynix-sees-mid-60-dram-gains/) · [Counterpoint](https://counterpointresearch.com/en/insights/global-dram-and-hbm-market-share)\n\n---\n*공개 정보 기반 참고용 분석이며 투자 권유가 아니다. 발췌 인용은 2차 전사 기준.*"}, {"id": "2026-06_micron-FQ3_persona-skhynix-marketer", "title": "마이크론 FQ3'26 실적·컨콜 분석 — SK하이닉스 마케터 관점", "date": "2026-06-25", "target": "Micron Technology", "persona": "sk_hynix_marketer", "scope": "", "quarter": "Micron FQ3'26 (2026-03~05) / 경쟁사 CY1Q'26 (2026-01~03)", "md": "# 마이크론 FQ3'26 실적·컨콜 분석 — SK하이닉스 마케터 관점\n\n> **케이스 설정**\n> - **페르소나(관점):** SK하이닉스 마케터\n> - **분석 대상:** Micron Technology, 회계연도 3분기(FQ3 FY2026)\n> - **경쟁 분석:** ON — SK하이닉스 / 삼성전자를 동일 프레임으로 정량·정성 비교\n> - **작성일:** 2026-06-25\n\n### 데이터 신뢰도 경고\n- **1차 사료 차단:** Micron SEC 8-K·IR 준비발언 PDF, Micron/삼성 컨콜 전사 원문은 자동 수집(WebFetch) 시 **403 차단**. 아래 수치·발언 발췌는 **2차 전사·보도 교차 확인본**(Investing.com 컨콜 전사, Yahoo Finance/ BigGo 전사, StockTitan, CNBC, wccftech, TechPowerUp 등)이다.\n- **발언 인용 표기:** §2·§4의 영문 발췌는 위 2차 전사가 옮긴 표현으로, **원문 PDF와 1:1 대조는 미완료**(403). 의미 단위로는 복수 매체에서 일치.\n- **⚠️ 확인 필요 항목:** Micron DRAM/NAND **세그먼트 절대액·비중**은 매체 간 수치가 상충($18.8B vs ~$32.8B 등) → **추정·확인 필요**로 표기.\n\n### 기간 정합성 — 회계연도 vs 캘린더 매핑\nMicron의 회계연도는 캘린더보다 약 1개 분기 앞선다(FY 종료 ≈ 8월 말). 따라서 같은 \"1분기/3분기\"라도 실제 기간이 다르다.\n\n| 회사 | 보고 명칭 | 실제 분기 기간 | 분기 종료 | 발표일 |\n|---|---|---|---|---|\n| **Micron** | FQ3 FY2026 | 2026년 **3~5월**(≈ 캘린더 2Q'26 초입) | 2026-05-28 | 2026-06-24 |\n| **SK하이닉스** | 1Q FY2026 = **CY1Q'26** | 2026년 **1~3월** | 2026-03-31 | 2026-04-23 |\n| **삼성전자** | 1Q FY2026 = **CY1Q'26** | 2026년 **1~3월** | 2026-03-31 | 2026-04-30 |\n\n> **⚠️ 비교 시 감안:** Micron 분기 종료(5/28)는 SK·삼성(3/31)보다 **약 2개월 더 최신**. 메모리 가격이 가파르게 오르는 국면이라, Micron 수치가 동일 사이클의 **더 늦은(=강한) 구간**을 반영한다. 절대 규모 비교보다 **QoQ 모멘텀·가이던스·톤**의 방향성 비교가 더 안전하다.\n\n---\n\n## 1. 마이크론 FQ3'26 — 정량 요약\n\n| 항목 | 수치 | 비고 |\n|---|---|---|\n| 매출 | **$41.5B** | QoQ +74% / YoY +346% (전분기 $23.86B) |\n| GAAP 총이익률 | **약 84.9% (~85%)** | 사상 최고 |\n| EPS | **$25.11** | 컨센서스 $20.28 대비 +23.8% 서프라이즈 |\n| 데이터센터 매출 | **>$25B** | 연환산 런레이트 **>$100B** |\n| CMBU(클라우드 메모리 BU) | $13.8B / GM 83% | 사상 최고 |\n| CDBU(코어 데이터센터 BU) | $11.5B / GM 87% | — |\n| DRAM 비중 | 매출의 **~79%** | ⚠️ 절대액 매체 간 상충($18.8B vs ~$32.8B), 확인 필요 |\n| NAND | 기록적 **$9.9B (~24%)** | ⚠️ 비중 합산 불일치, 확인 필요 |\n| HBM4 누적매출 | **>$1B** | HBM4 12단 램프가 HBM3E 12단 대비 **2배 속도** |\n\n**FQ4'26 가이던스:** 매출 **$50.0B ±$1.0B**, GAAP/Non-GAAP 총이익률 **약 86%**, GAAP EPS **$30.73 ±$1.00**, Non-GAAP EPS **$31.00 ±$1.00**, Non-GAAP 영업비용 ~$1.65B.\n\n**전략 고객 계약(SCA):** 16건, **최소 계약매출 약 $100B**, **선수금 $22B** 확보. CY2026 HBM 물량은 **가격·수량 전량 계약 완료(완판)**, HBM3E·HBM4는 **캘린더 2027까지 풀북, 수요는 2028까지** 연장.\n\n---\n\n## 2. 마이크론 컨콜 — 정성(톤) 발췌 분석\n\n각 항목은 **① 원문 발췌(영문, 2차 전사 기준) → ② 해석 → ③ SK하이닉스 시사점** 순.\n\n**① 계약 기반 사업으로 서사 전환**\n> *\"…strategic customer agreements … significantly enhance the **durability and predictability** of Micron's strong financial performance, accelerating the transformation of the business model.\"* — S. Mehrotra (준비발언, 2차 전사)\n- **해석:** 메모리를 사이클 사업이 아니라 **계약 기반의 예측 가능한 사업**이라고 정면에서 내세웠다.\n- **시사점:** 가격 사이클 우려를 말투로 미리 차단했다. SK도 같은 \"가시성\" 언어를 갖추지 못하면 신뢰 싸움에서 밀린다.\n\n**② HBM 점유율 의도적 절제**\n> *\"…we plan for our **market share in HBM to match our market share in DRAM**.\"* — Micron 경영진 (2차 전사)\n- **해석:** HBM이 웨이퍼를 많이 소모해 비(非)HBM 공급을 압박하므로, **HBM 1위를 노리지 않겠다**는 신호다.\n- **시사점:** SK가 HBM 점유율 1위·최대 생산능력을 더 공격적으로 마케팅할 여지가 생긴다.\n\n**③ 공급 타이트니스 장기 고착**\n> *\"HBM3E and HBM4 are **fully booked through calendar 2027**, with demand extending into 2028.\"* — Micron (2차 전사)\n- **해석:** 가격 강세 서사를 2027~28년까지 못박았다.\n- **시사점:** \"지금 계약하지 않으면 2027년 물량이 없다\"는 조기 계약 압박의 업계 공통 명분이 된다.\n\n**④ HBM4 램프 속도**\n> *\"…HBM4 12-high volume ramp is **tracking twice as fast** as HBM3E 12-high … over **$1 billion** in HBM4 revenue.\"* — Micron (2차 전사)\n- **해석:** HBM4 전환 속도를 숫자로 내세웠다.\n- **시사점:** SK는 HBM4를 **수율·전력 효율·검증된 양산 실적** 숫자로 차별화해 맞받아야 한다.\n\n**⑤ 수요 구조 변화**\n- 에이전틱 AI가 데이터센터를 구조적으로 재편 → 가속기 랙을 넘어 **CPU 랙·스토리지 랙**으로 메모리 계층 확장 (준비발언 취지).\n- **시사점:** 가속기향 HBM 일변도를 넘어 **서버 DRAM·eSSD·고용량 솔루션** 메시지로 외연 확장.\n\n---\n\n## 3. 경쟁 현황 — 정량 비교 (동일 프레임)\n\n각 행은 **세 회사를 같은 지표로 나란히** 두고, 마지막 열에 **핵심 차이(1줄)** 를 일관된 톤으로 적었다. ⚠️ 시점차(§기간 경고) 감안.\n\n| 지표 | **Micron** (FQ3'26, ~5/28) | **SK하이닉스** (CY1Q'26, 3/31) | **삼성 DS** (CY1Q'26, 3/31) | **핵심 차이** |\n|---|---|---|---|---|\n| 분기 매출 | $41.5B | ₩52.58조 | DS ₩81.7조 / 전사 ₩133.87조 | 절대 규모: **삼성DS > SK > Micron** |\n| 이익률 | GM **~85%** | 영업이익률 **72%** | DS가 전사 OP의 **94%** 차지 | 이익 밀도: **Micron·SK 동급 최상**, 삼성은 전사 의존도 편중 |\n| QoQ 모멘텀 | **+74%** | +60% | 전사 +69%(YoY OP +756%) | 최신 분기 모멘텀: **Micron 최고**(단, 2개월 더 최신) |\n| HBM 수급관 | CY26 **완판**, 27까지 풀북 | 향후 **3년 수요 > 생산능력** | 2027 **공급부족 경고** | 결론 동일(초과수요), **표현 강도만 차이** |\n| HBM4 단계 | 양산 중, 12단 2배속 램프 | 샘플 2H'26 → 양산 2027 | 2월 양산, Vera Rubin향 6세대 첫 공급 | 양산 시점: **삼성 선제 → Micron → SK** 순서 주장 |\n| ASP/가격 | 별도 미공시 | DRAM ASP **+mid-60%**, NAND +mid-30% | 컨벤셔널 DRAM이 **현재 HBM보다 고수익** | 가격 공시 투명도: **SK 최다**, 삼성은 구조 코멘트 중심 |\n\n---\n\n## 4. 경쟁 현황 — 정성(톤) 비교\n\n각 축마다 **세 회사를 같은 어법(한 줄 입장 + 발췌 앵커)** 으로 비교하고, **핵심 차이** 를 일관 톤으로 명시.\n\n| 축 | **Micron** | **SK하이닉스** | **삼성** | **핵심 차이** |\n|---|---|---|---|---|\n| **지배 서사** | \"durability & predictability\" — 계약 기반 전환 | 기록 경신 + **재무 규율(discipline)** | DS가 전사 OP 94% — \"편중된 이익 구조\" | Micron만 **'예측가능성'** 을 선점, 타사는 '기록·규율' |\n| **공급관** | \"fully booked through 2027, into 2028\" | \"수요 > 향후 3년 생산능력\"(김기태 HBM 영업) | 고객이 **2027 물량 선당김**, 갭 확대 | 메시지 동일(초과수요), Micron이 **연도 못박기** 가장 구체 |\n| **가격 구조** | CY26 HBM 가격·물량 완판(연간 고정가 함의) | ASP 급등 수치로 강세 입증 | **\"컨벤셔널 DRAM이 HBM보다 현재 수익↑\"**(HBM 연간 고정 vs 컨벤셔널 분기 협상) | 삼성만 **HBM 고정가의 단점**을 공개 — SK도 동일 노출 |\n| **점유율 태도** | HBM 점유율 **DRAM 수준으로 의도적 제한** | DDR5 수익 우선·HBM 램프 속도 조절(보도) | HBM4 선제 양산으로 **리더십 탈환** 시도 | Micron=절제 / 삼성=공세 / SK=수익 우선 — **삼성만 점유율 공세** |\n| **투자 기조** | SCA 선수금 **$22B** 로 캐펙스 뒷받침 | 캐펙스 대폭 확대(M15X·용인·EUV) | HBM 매출 2026년 **3배+** 목표 | 자금 조달 방식: Micron만 **고객 선수금 락인** 모델 |\n| **단기 이익 vs 규율** | 계약으로 변동성 축소 | \"규율\" 유지하며 증설 | **\"단기 이익 위해 방향 틀지 않음\"** 명시 | 세 회사 모두 규율 강조, **삼성이 가장 명시적** |\n\n---\n\n## 5. SK하이닉스 마케터를 위한 임플리케이션\n\n### A. 경쟁 위협 신호 (방어 필요)\n1. **Micron의 $100B SCA + $22B 선수금이 고객을 장기로 묶는다.** 메모리를 \"예측 가능한 계약 사업\"이라고 자리매김하는 서사를 Micron이 선점했다. → SK도 **장기·복수년 공급계약**을 마케팅 전면에 세워 \"공급 신뢰성\" 메시지를 빼앗기지 말아야 한다.\n2. **삼성 HBM4 선제 양산 + Nvidia Vera Rubin향 첫 공급** = SK가 내세운 HBM 기술 우위 서사에 직접 도전. → **12단 수율·전력 효율·검증된 양산 실적** 수치로 차별화한다.\n\n### B. 활용 가능한 기회 (공세)\n3. **Micron이 \"HBM 점유율을 DRAM 점유율 수준으로 제한\"** 공언 = HBM 1위를 노리지 않음. → SK가 **\"HBM 점유율 1위·최대 생산능력\"** 을 더 공격적으로 마케팅할 여지가 있다.\n4. **공급 부족이 2027년 이후까지 간다는 데 3사가 한목소리.** 가격 강세 서사가 업계 표준이 됐다. → **조기 계약 압박**(\"2027년 물량 선점\")의 명분으로 쓸 수 있다.\n\n### C. 전략·구조 통찰\n5. **삼성發 경고: \"컨벤셔널 DRAM이 지금은 HBM보다 수익이 높다 — HBM은 연간 고정가.\"** SK도 같은 구조에 놓여 있다. → **HBM 계약의 가격 재협상·연동 조항**을 IR·세일즈와 함께 점검해 상승장 이익이 새지 않게 막는다. 메시지에서도 \"HBM=프리미엄\"과 \"컨벤셔널 DDR5 강세\"를 **둘 다** 활용한다.\n6. **수요처 변화: 에이전틱 AI가 메모리 계층을 CPU 랙·스토리지 랙까지 넓힌다.** 가속기향 HBM 한 곬을 넘어 **서버 DRAM·eSSD·고용량 솔루션**으로 마케팅 외연을 넓힌다.\n\n### D. 톤 벤치마크\n7. Micron은 **\"durability/predictability\"** 로 사이클 우려를 차단했다. SK 메시지가 \"기록·규율\"에 머문다면 **\"장기 가시성\"** 언어를 보강해야 한다.\n\n---\n\n## 6. 한 줄 결론\n> Micron은 **계약 기반·완판·점유율 절제** 세 박자로 \"예측 가능성\" 서사를 선점했고, 삼성은 **HBM4 선제 양산과 가격 구조 솔직함**으로 차별화하고 있다. SK하이닉스 마케터는 (1) **장기계약·공급 신뢰성 메시지로 방어**하고, (2) **HBM 1위·최대 생산능력으로 공세**하며, (3) **HBM 연간 고정가의 위험을 점검**하는 세 가지를 동시에 끌고 가야 한다.\n\n---\n\n### 출처\n**컨콜 전사 / 발언(2차)**\n- [Investing.com — Micron FQ3'26 earnings call transcript](https://www.investing.com/news/transcripts/earnings-call-transcript-micron-tops-q3-2026-estimates-shares-jump-146-93CH-4759504)\n- [Yahoo Finance — SK hynix Q1 FY2026 earnings call transcript](https://finance.yahoo.com/quote/000660.KS/earnings/000660.KS-Q1-2026-earnings_call-547968.html)\n- [BigGo — SK hynix Q1 2026 call: demand exceeds 3-yr capacity](https://finance.biggo.com/news/KR_000660.KS_2026-04-23)\n- [wccftech — Samsung Q1'26: conventional DRAM more profitable than HBM](https://wccftech.com/samsung-q1-2026-earnings-conventional-dram-more-profitable-than-hbm-right-now/)\n\n**실적 수치 / 보도**\n- [Micron IR — Fiscal Q3 2026 prepared remarks (PDF, 1차·403)](https://investors.micron.com/static-files/631b1a32-5537-46ae-8f40-82e42fc79dfe)\n- [SEC 8-K — Micron FY2026 Q3 press release (1차·403)](https://www.sec.gov/Archives/edgar/data/0000723125/000072312526000013/a2026q3ex991-pressrelease.htm)\n- [StockTitan — Micron Q3 record results, Q4 guide $50B](https://www.stocktitan.net/news/MU/micron-technology-inc-reports-record-results-for-the-third-quarter-6f50161e5zxh.html)\n- [CNBC — Micron MU earnings Q3 2026](https://www.cnbc.com/2026/06/24/micron-mu-earnings-report-q3-2026.html)\n- [Investing.com — Micron Q3'26 slides: $100B customer agreements](https://www.investing.com/news/company-news/micron-q3-2026-slides-record-margins-100b-customer-agreements-93CH-4759276)\n- [TechTimes — Micron $100B contracts, AI memory cycle](https://www.techtimes.com/articles/319032/20260625/micron-q3-2026-earnings-100b-contracts-signals-ai-memory-cycle-break.htm)\n- [CNBC — SK hynix record Q1 profit](https://www.cnbc.com/2026/04/23/sk-hynix-earnings-ai-memory-shortage-hbm-demand.html)\n- [Samsung Global Newsroom — Q1 2026 results](https://news.samsung.com/global/samsung-electronics-announces-first-quarter-2026-results)\n- [TechPowerUp — Samsung Q1 2026, warns 2027 shortage](https://www.techpowerup.com/348675/samsung-q1-2026-results-memory-profit-up-nearly-50x-warns-of-2027-shortage)"}];

  s = s.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
  // http(s) 링크만 허용 — javascript: 등 스킴 주입 차단(토큰 보호)
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function renderMd(md) {
  const lines = md.split(/\r?\n/);
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    if (/^\s*$/.test(line)) { i++; continue; }

    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); i++; continue; }

    if (/^(-{3,}|\*{3,})\s*$/.test(line)) { out.push("<hr>"); i++; continue; }

    if (/^\s*\|/.test(line)) {                       // 표
      const rows = [];
      while (i < lines.length && /^\s*\|/.test(lines[i])) rows.push(lines[i++]);
      const cells = r => r.replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|").map(c => c.trim());
      let html = '<div class="tablewrap"><table>';
      const hasSep = rows.length > 1 && /^[\s|:-]+$/.test(rows[1]);
      const head = cells(rows[0]);
      html += "<thead><tr>" + head.map(c => `<th>${inline(c)}</th>`).join("") + "</tr></thead><tbody>";
      for (let r = hasSep ? 2 : 1; r < rows.length; r++) {
        html += "<tr>" + cells(rows[r]).map(c => `<td>${inline(c)}</td>`).join("") + "</tr>";
      }
      out.push(html + "</tbody></table></div>");
      continue;
    }

    if (/^>\s?/.test(line)) {                        // 인용
      const q = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) q.push(lines[i++].replace(/^>\s?/, ""));
      out.push(`<blockquote><p>${inline(q.join(" "))}</p></blockquote>`);
      continue;
    }

    const isUl = s => /^\s*[-*]\s+/.test(s), isOl = s => /^\s*\d+\.\s+/.test(s);
    if (isUl(line) || isOl(line)) {                  // 목록 (연속 들여쓰기 줄 병합)
      const ordered = isOl(line);
      const items = [];
      while (i < lines.length && (isUl(lines[i]) || isOl(lines[i]) || /^\s{2,}\S/.test(lines[i]))) {
        if (isUl(lines[i]) || isOl(lines[i])) {
          items.push(lines[i].replace(/^\s*([-*]|\d+\.)\s+/, ""));
        } else {
          items[items.length - 1] += " " + lines[i].trim();
        }
        i++;
      }
      const tag = ordered ? "ol" : "ul";
      out.push(`<${tag}>` + items.map(t => `<li>${inline(t)}</li>`).join("") + `</${tag}>`);
      continue;
    }

    const para = [line];                             // 문단 (연속 줄 병합)
    i++;
    while (i < lines.length && lines[i].trim() &&
           !/^(#{1,6}\s|>\s?|\s*\||\s*[-*]\s|\s*\d+\.\s|-{3,}\s*$)/.test(lines[i])) {
      para.push(lines[i++]);
    }
    out.push(`<p>${inline(para.join(" "))}</p>`);
  }
  return out.join("\n");
}

// ---------- 셀렉터 UI ----------
const $t = document.getElementById("sel-target");
const $r = document.getElementById("sel-report");
const $meta = document.getElementById("meta");
const $article = document.getElementById("report");
document.getElementById("count").textContent = ` 보고서 ${REPORTS.length}건`;

const targets = ["전체", ...new Set(REPORTS.map(r => r.target))];
$t.innerHTML = targets.map(t => `<option>${esc(t)}</option>`).join("");

function fillReports() {
  const t = $t.value;
  const list = REPORTS.filter(r => t === "전체" || r.target === t);
  $r.innerHTML = list.map(r =>
    `<option value="${esc(r.id)}">${esc(r.date)} · ${esc(r.title)}</option>`).join("");
  show();
}
function show() {
  const rep = REPORTS.find(r => r.id === $r.value) || REPORTS[0];
  if (!rep) return;
  const scopeLabel = { both: "통합", earnings: "실적", call: "컨콜" }[rep.scope];
  $meta.textContent = [`${rep.date}`, `대상: ${rep.target}`, `관점: ${rep.persona}`,
                       scopeLabel && `범위: ${scopeLabel}`,
                       rep.quarter && `기간: ${rep.quarter}`].filter(Boolean).join("  ·  ");
  $article.innerHTML = renderMd(rep.md);
  window.scrollTo(0, 0);
}
$t.addEventListener("change", fillReports);
$r.addEventListener("change", show);
fillReports();

// ---------- 새 분석 실행 (GitHub Actions workflow_dispatch) ----------
const $$ = id => document.getElementById(id);
const API = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/actions`;
const ghHeaders = token => ({
  "Authorization": `Bearer ${token}`,
  "Accept": "application/vnd.github+json",
  "X-GitHub-Api-Version": "2022-11-28",
});

$$("run-persona").innerHTML =
  CONFIG.personas.map(p => `<option>${esc(p)}</option>`).join("") +
  `<option value="__custom__">✏️ 직접 입력…</option>` +
  `<option value="__url__">🔗 다른 레포에서 (raw URL)…</option>`;
$$("run-persona").addEventListener("change", () => {
  const v = $$("run-persona").value;
  $$("custom-persona-wrap").style.display = v === "__custom__" ? "" : "none";
  $$("url-persona-wrap").style.display = v === "__url__" ? "" : "none";
});
$$("run-branch").value = CONFIG.branch;
$$("run-token").value = localStorage.getItem("ir_gh_token") || "";
$$("target-list").innerHTML =
  [...new Set(REPORTS.map(r => r.target))].map(t => `<option value="${esc(t)}">`).join("");

$$("run-btn").addEventListener("click", async () => {
  const token = $$("run-token").value.trim();
  const target = $$("run-target").value.trim();
  const status = $$("run-status");
  if (!token) { status.textContent = "토큰이 필요합니다."; return; }
  if (!target) { status.textContent = "분석 대상을 입력하세요."; return; }
  if ($$("run-persona").value === "__custom__" &&
      !$$("run-custom-persona").value.trim()) {
    status.textContent = "관점 서술을 입력하세요."; return;
  }
  if ($$("run-persona").value === "__url__" &&
      !$$("run-persona-url").value.trim()) {
    status.textContent = "페르소나 URL을 입력하세요."; return;
  }
  localStorage.setItem("ir_gh_token", token);
  $$("run-btn").disabled = true;
  status.textContent = "실행 요청 중…";
  try {
    const res = await fetch(`${API}/workflows/${CONFIG.workflow}/dispatches`, {
      method: "POST",
      headers: ghHeaders(token),
      body: JSON.stringify({
        ref: $$("run-branch").value.trim(),
        inputs: {
          target,
          persona: ["__custom__", "__url__"].includes($$("run-persona").value)
            ? CONFIG.personas[0] : $$("run-persona").value,
          custom_persona: $$("run-persona").value === "__custom__"
            ? $$("run-custom-persona").value.trim() : "",
          persona_url: $$("run-persona").value === "__url__"
            ? $$("run-persona-url").value.trim() : "",
          scope: $$("run-scope").value,
          model: $$("run-model").value,
          competitive: $$("run-competitive").checked ? "true" : "false",
          competitors: $$("run-competitors").value.trim(),
        },
      }),
    });
    if (res.status !== 204) {
      throw new Error(`HTTP ${res.status} — ${(await res.text()).slice(0, 200)}`);
    }
    status.textContent = "요청됨 — 실행 시작을 기다리는 중…";
    setTimeout(() => poll(token, Date.now()), 6000);
  } catch (e) {
    status.textContent = "실패: " + e.message +
      " (토큰 권한·브랜치명을 확인하세요)";
    $$("run-btn").disabled = false;
  }
});

async function poll(token, since) {
  const status = $$("run-status");
  try {
    const branch = encodeURIComponent($$("run-branch").value.trim());
    const res = await fetch(
      `${API}/workflows/${CONFIG.workflow}/runs?branch=${branch}&per_page=1`,
      { headers: ghHeaders(token) });
    const run = (await res.json()).workflow_runs?.[0];
    // 방금 요청한 실행만 추적 (2분 여유)
    if (run && new Date(run.created_at).getTime() > since - 120000) {
      const link = ` — <a href="${run.html_url}" target="_blank" rel="noopener">로그 보기</a>`;
      if (run.status === "completed") {
        $$("run-btn").disabled = false;
        status.innerHTML = run.conclusion === "success"
          ? "✅ 분석 완료. 1~2분 뒤 새로고침하면 목록에 나타납니다." + link
          : `❌ 실패 (${run.conclusion})` + link;
        return;
      }
      status.innerHTML = `⏳ 실행 중 (${run.status}) — 보통 5~10분 걸립니다.` + link;
    }
  } catch (e) { /* 일시적 네트워크 오류는 다음 폴링에서 회복 */ }
  setTimeout(() => poll(token, since), 15000);
}
</script>
