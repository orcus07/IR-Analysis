# render.com 배포 설정 (Blueprint)
#
# 사용: https://dashboard.render.com → New → Blueprint → 이 저장소 연결.
# Render가 이 파일을 읽어 정적 사이트를 만든다. 이후에는 푸시(수동 분석 커밋,
# Actions 봇 커밋 포함)마다 자동으로 다시 배포된다.
#
# 빌드: analyses/*.md 를 다시 스캔해 docs/index.html 을 만들고 docs/ 를 서빙.
# 커밋된 docs/index.html 이 있어도 항상 최신 보고서 목록으로 재빌드한다.

services:
  - type: web
    name: ir-analysis
    runtime: static
    # 재빌드를 시도하되, 실패하면 커밋돼 있는 docs/index.html 을 그대로 서빙한다.
    buildCommand: (python3 -m pip install pyyaml && python3 -m render.build) || echo "using committed docs/"
    staticPublishPath: docs
    envVars:
      # Actions(analyze.yml)의 파이썬과 동일 계열로 고정 — 버전 불일치로 인한
      # "CI에서는 되는데 Render 빌드만 깨짐"을 방지한다.
      - key: PYTHON_VERSION
        value: 3.12.7
